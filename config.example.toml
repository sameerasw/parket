# parket configuration
# copy to ~/.config/parket/config.toml

# number of workspaces (1-9)
# workspace_count = 9

# master window width ratio (0.0-1.0)
# master_ratio = 0.50

# window margin (padding) all around the screen
# padding = 0

# gap between windows
# gap = 0

# hide applications that are not on the active workspace
# hide_inactive_apps = false

# screen side or corner to keep inactive app windows: "left", "right", "top", "bottom", "top-left", "top-right", "bottom-left", "bottom-right"
# inactive_window_position = "left"

# global modifier key: "option", "control", "command"
# modifier = "option"

# built-in action bindings
# key names: a-z, 0-9, return, tab, space, escape, delete,
#   comma, period, slash, backslash, minus, equal, grave,
#   leftbracket, rightbracket, semicolon, quote
# prefix with shift+ for shift modifier
# [bindings]
# focus_next = "j"
# focus_prev = "k"
# swap_master = "return"
# toggle_layout = "m"
# focus_monitor_prev = "comma"
# focus_monitor_next = "period"
# move_monitor_prev = "shift+comma"
# move_monitor_next = "shift+period"
# last_workspace = "tab"
# prev_workspace = "q"
# next_workspace = "e"
# move_workspace_prev = "shift+q"
# move_workspace_next = "shift+e"
# refresh = "r"

# custom key bindings that run shell commands
# [[custom]]
# key = "shift+return"
# command = "open -n -a Terminal"
