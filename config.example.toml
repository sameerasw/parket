# parket configuration
# copy to ~/.config/parket/config.toml

# number of workspaces (1-9)
# workspace_count = 9

# custom names for each workspace (optional)
# workspace_names = ["Main", "Web", "Code", "Chat", "Music"]

# master window width ratio (0.0-1.0)
# master_ratio = 0.50

# window margin (padding) all around the screen
# padding = 0

# gap between windows
# gap = 0

# hide applications that are not on the active workspace
# hide_inactive_apps = false

# resize inactive windows to 1x1 size when moving them off-screen (disabling this leaves them at original size)
# resize_on_hide = true

# disable padding and gaps when there is only one window on the workspace
# no_padding_for_single_window = false

# allow workspace switching to loop from last to first (and vice versa)
# workspace_loop = false

# screen side or corner to keep inactive app windows: "left", "right", "top", "bottom", "top-left", "top-right", "bottom-left", "bottom-right"
# inactive_window_position = "left"

# enable rounded corners overlay on all screens
# enable_corners = false

# corner radius size for the rounded corners overlay
# corner_radius = 12.0

# enable dynamic menu bar auto-hide (forces auto-hide in clamshell/docked mode, disables on built-in screen)
# enable_dynamic_menubar = false

# always center floating windows on workspace switch (if disabled, they are centered at start and when toggled but otherwise remain in place)
# always_center_floating = false

# priority when opening and placing windows: "none", "last" (uses last session's workspaces), "config" (uses rules in config file)
# workspace_priority = "last"

# enable option+shift+i shortcut to copy the package name (bundle ID) of the active window
# enable_copy_package_name = false

# list of apps (bundle IDs) that float by default
# floating_apps = ["com.apple.Calculator"]

# map applications (bundle IDs) to static workspace numbers (1-based indices)
# [workspace_rules]
# "com.apple.Terminal" = 1
# "com.apple.Safari" = 2

# HUD overlay options
# hud_enabled = true
# hud_position = "top" # "top" or "bottom"
# hud_y_offset = 50.0
# hud_duration = 1.5
# hud_on_workspace_switch = true
# hud_on_layout_switch = true
# hud_on_config_reload = true

# global modifier key: "option", "control", "command"
# modifier = "option"

# built-in action bindings
# key names: a-z, 0-9, return, tab, space, escape, delete,
#   comma, period, slash, backslash, minus, equal, grave,
#   leftbracket, rightbracket, semicolon, quote
# prefix with shift+ for shift modifier
# [bindings]
# focus_next = "j"
# focus_prev = "k"
# swap_master = "return"
# toggle_layout = "m"
# focus_monitor_prev = "comma"
# focus_monitor_next = "period"
# move_monitor_prev = "shift+comma"
# move_monitor_next = "shift+period"
# last_workspace = "tab"
# prev_workspace = "q"
# next_workspace = "e"
# move_workspace_prev = "shift+q"
# move_workspace_next = "shift+e"
# refresh = "r"
# reload_config = "shift+r"
# toggle_menubar = "m"
# toggle_dynamic_menubar = "shift+m"
# shrink_window = "minus"
# expand_window = "equal"
# toggle_always_center_floating = "o"

# custom key bindings that run shell commands
# [[custom]]
# key = "shift+return"
# command = "open -n -a Terminal"

# trackpad swipe support for switching to prev/next workspaces
# [trackpad]
# enable = false
# fingers = 3 # 3 or 4
# haptic_type = "non" # "non", "light", "double", "strong"
# sensitivity = 1.0 # higher value = more sensitive
# allow_multiple = false # allow multiple workspace switches per continuous swipe gesture
# rumble = false # trigger a very light haptic rumble early in the swipe gesture

# mouse gesture support for switching workspaces (by dragging horizontally while holding down a mouse button)
# [mouse_gesture]
# enable = false
# button = 5 # 1-based mouse button index (e.g. 5 = Button 5, 4 = Button 4)
# sensitivity = 1.0 # higher value = more sensitive (smaller drag distance required)
